name: Deploy to cPanel

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create deployment archive
        run: git archive --format=zip HEAD -o /tmp/deploy.zip

      - name: Upload archive to cPanel home dir
        run: |
          RESPONSE=$(curl -s -k \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -F "dir=/home/gruprez1" \
            -F "file=@/tmp/deploy.zip;filename=deploy.zip" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/upload_files")
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('status',0)==1 else 1)"

      - name: Trigger PHP deployment
        run: |
          RESPONSE=$(curl -sk "https://gruptalepleri.com/gitfix.php?t=grt2026fix")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q "BAŞARILI" && echo "Deploy OK" || exit 1
