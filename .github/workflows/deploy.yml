name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ftp.gruptalepleri.com
        username: SENIN_FTP_USER
        password: SENIN_FTP_PASS
        server-dir: /public_html/