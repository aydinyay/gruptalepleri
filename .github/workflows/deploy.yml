name: Deploy to cPanel

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create deployment archive
        run: git archive --format=zip HEAD -o /tmp/deploy.zip

      - name: Upload archive to cPanel
        run: |
          RESPONSE=$(curl -s -k \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -F "dir=/home/gruprez1" \
            -F "file=@/tmp/deploy.zip;filename=deploy.zip" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/upload_files")
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('status',0)==1 else 1)"

      - name: Extract archive to web root
        run: |
          RESPONSE=$(curl -s -k \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -X POST \
            -d "destdir=/home/gruprez1/gruptalepleri.com" \
            -d "files[0][file]=/home/gruprez1/deploy.zip" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/extract")
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('status',0)==1 else 1)"

      - name: Delete zip file
        run: |
          curl -s -k \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -X POST \
            -d "files[0][file]=/home/gruprez1/deploy.zip" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/unlink" || true

      - name: Clear caches
        run: |
          sleep 5
          curl -sk "https://gruptalepleri.com/dp-hook.php?t=grt2026dp" && echo "OK" || echo "hook skipped"
