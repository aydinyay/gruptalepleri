name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Deploy changed files to server
        run: |
          HOOK="https://gruptalepleri.com/gitfix.php"
          TOKEN="grt2026fix"

          # İlk commit ise tüm dosyalar, değilse sadece değişenler
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            FILES=$(git ls-files)
          fi

          echo "Deploy edilecek dosyalar:"
          echo "$FILES"

          FAIL=0
          for FILE in $FILES; do
            if [ -f "$FILE" ]; then
              TMPFILE=$(mktemp)
              base64 -w 0 "$FILE" > "$TMPFILE"
              RESP=$(curl -sf --max-time 90 --connect-timeout 30 --retry 3 --retry-delay 3 -X POST "$HOOK" \
                -F "t=$TOKEN" \
                -F "p=$FILE" \
                -F "c=<$TMPFILE" 2>&1) || { echo "WARN: $FILE upload failed (curl $?)"; FAIL=$((FAIL+1)); rm -f "$TMPFILE"; continue; }
              rm -f "$TMPFILE"
              echo "$FILE: $RESP"
            fi
          done
          if [ $FAIL -gt 0 ]; then echo "WARNING: $FAIL dosya yüklenemedi"; exit 1; fi

      - name: Run migrations (sosyal medya)
        run: |
          sleep 8
          RESP=$(curl -sf --max-time 60 "https://gruptalepleri.com/mig-sm-2026?t=grtmig2026sm" 2>&1 || true)
          echo "$RESP"

      - name: Clear caches
        run: |
          curl -sf "https://gruptalepleri.com/gitfix.php?t=grt2026fix" && echo "Cache temizlendi"
