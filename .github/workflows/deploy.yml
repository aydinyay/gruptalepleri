name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code to cPanel
        run: |
          RESPONSE=$(curl -s -k \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/update?repository=/home/gruprez1/repositories/gruptalepleri2")
          echo "$RESPONSE" | python3 -m json.tool || echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('status',0)==1 else 1)"

      - name: Deploy HEAD to web root
        run: |
          RESPONSE=$(curl -s -k \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/VersionControl/deploy?repository=/home/gruprez1/repositories/gruptalepleri2&deploytag=HEAD")
          echo "$RESPONSE" | python3 -m json.tool || echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('status',0)==1 else 1)"
